<!-- ==========================================================================
     index.html  —  THE HOMEPAGE
     A compressed hero, and then the screen splits into TWO WORLDS, because two
     different people land here:

       LEFT  — "I'm New Here"    the journey. One door: Begin. This side is about
                                 BECOMING. (The laurel progression that tells this
                                 story lives large on /new-agents, where it's
                                 legible — it was too small to read here.)
       RIGHT — "I'm Producing"   the toolkit. One door: Agent Portal. This side is
                                 about DOING, so it is denser, squarer, more
                                 utilitarian. More will be added to it later.

     The page ends on those two choices. There is no third door: the nav is now
     Start Here and Agent Portal, and nothing else.

     BACKGROUND: a static forest gradient with a faint gold glow (see /js/main.js
     and .ulg-bg in styles.css). The old drifting-ember effect was retired with
     the forest/gold rebrand.

     ---------------------------------------------------------------------------
     THE LOGO: the mark is the gold lion emblem over the Cinzel wordmark, inlined
     below from /unity-life-group-logo.svg so the intro can animate its pieces.
     The emblem is ONE merged unit and must move as one. (The old three-shield
     lockup and its tools/build-marks.js generator are retired — see brand.md in
     the vault.)
     ========================================================================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity Life Group — Agent Hub</title>

  <!-- Internal hub: ask search engines not to list it publicly. -->
  <meta name="robots" content="noindex, nofollow" />

  <!-- Brand fonts: Cinzel (display/headings, matches the wordmark) and Albert Sans (labels + body). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@400;500;600&family=Cinzel:wght@500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="icon" href="/brand/emblem.svg" />
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- ---------- ARMING THE LOGO INTRO ----------
       This has to run HERE, in the head, and it has to be inline: it decides
       whether the intro plays, and that decision must be made before the browser
       paints a single frame. Deferred to the end of <body> (where all our other
       scripts live) the hero would flash on screen for a frame before the intro
       overlay covered it — which is precisely the thing an intro is for.

       ONCE PER SESSION. The flag is written the moment the intro is armed, not
       when it finishes, so a visitor who lands and immediately clicks through to
       another page doesn't get the intro again when they come back.

       FORCE REPLAY FOR TESTING. Loading the homepage with "?intro" (or "#intro")
       in the URL always plays it, ignoring the once-per-session flag — e.g.
       http://localhost:4173/?intro . Handy for reviewing the animation without
       having to clear site data. Normal visits are unaffected.

       No class = no intro: the overlay is display:none by default, so the "not
       playing" path costs nothing and the page is just the page. sessionStorage
       throws in some locked-down/private modes, so a failure quietly means
       "no intro" rather than a broken homepage. -->
  <script>
    var ULG_FORCE_INTRO =
      location.search.indexOf("intro") !== -1 || location.hash.indexOf("intro") !== -1;
    try {
      if (ULG_FORCE_INTRO || !sessionStorage.getItem("ulg-intro-played")) {
        sessionStorage.setItem("ulg-intro-played", "1");
        document.documentElement.classList.add("intro-armed");
      }
    } catch (e) {
      /* no sessionStorage (private mode, blocked cookies): still honour ?intro */
      if (ULG_FORCE_INTRO) document.documentElement.classList.add("intro-armed");
    }
  </script>
</head>

<!-- "page-home" switches on the midnight gradient and the no-scroll rule.
     'data-bg="full"' is what turns the background layer up to full strength. -->

    <!-- ---------- THE LOCKUP — THE NEW EMBLEM ARTWORK ----------
         The genuine mark: the gold lion emblem (crown + lion + laurels, one
         merged unit) over the Cinzel wordmark, from /unity-life-group-logo.svg.
         It is INLINED so the intro can animate its pieces — the emblem falls
         into place, then UNITY, then LIFE GROUP, then the flanking rules, and a
         pair of gold rings ripples out from the emblem's heart.

         THE SVG-TRANSFORM TRAP (brand.md): the emblem group already carries its
         own transform attribute, and a CSS transform on that same element would
         override it and throw the lion into the corner. So every animated piece
         is an OUTER <g> wrapper (.lk-emblem / .lk-unity / .lk-lg / .lk-rules)
         that carries transform-box: fill-box — the wrapper animates, the real
         artwork inside is never touched. Without the intro they are inert and
         this is simply the logo. The wordmark is live Cinzel/Albert Sans text,
         which is allowed here because the site controls font loading. -->
