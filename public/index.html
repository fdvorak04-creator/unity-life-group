<!-- ==========================================================================
     index.html
     This is the actual web page. It is the SKELETON only: a header at the top,
     an empty main area in the middle, and a footer at the bottom.
     The empty placeholder boxes show you where future content will go.
     ========================================================================== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic settings the browser needs -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unity Life Group</title>

  <!-- Fonts (Lora for headings, Inter for body text) loaded from Google -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Our styling file -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

  <!-- ===================== HEADER / NAV BAR ===================== -->
  <!-- The strip across the very top: your name on the left, menu on the right. -->
  <header class="site-header">
    <div class="container header-inner">

      <!-- Your brand / business name -->
      <a href="/" class="brand">Unity Life Group</a>

      <!-- The navigation menu. Empty for now — add links here later. -->
      <nav class="main-nav">
        <!-- Example of what a link will look like (kept as a comment for now):
        <a href="/about">About</a>
        <a href="/services">Services</a>
        <a href="/contact">Contact</a>
        -->
        <span class="nav-placeholder">Menu links go here</span>
      </nav>

    </div>
  </header>


  <!-- ===================== MAIN CONTENT AREA ===================== -->
  <!-- The big middle section. Everything you build lives inside <main>. -->
  <main class="site-main">
    <div class="container">

      <!-- SECTION 1 placeholder -->
      <section class="placeholder-section">
        <span class="placeholder-tag">Section 1</span>
        <p class="placeholder-note">
          This is an empty content section. Tell Claude what to put here
          (for example: a welcome headline and a short intro).
        </p>
      </section>

      <!-- SECTION 2 placeholder -->
      <section class="placeholder-section">
        <span class="placeholder-tag">Section 2</span>
        <p class="placeholder-note">
          Another empty section, ready for content whenever you are.
        </p>
      </section>

    </div>
  </main>


  <!-- ===================== FOOTER ===================== -->
  <!-- The strip across the bottom: copyright and small links later. -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-brand">Unity Life Group</span>
      <span class="footer-note">Footer content goes here</span>
    </div>
  </footer>

  <!-- Our JavaScript file (empty for now, ready for future interactivity) -->
  <script src="/js/main.js"></script>
</body>
</html>
